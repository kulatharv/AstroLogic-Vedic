<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AstroLogic | AI Prediction</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
  background: radial-gradient(circle at top, #06192d, #010812);
  color:#ffffff;
  font-family:"Segoe UI", sans-serif;
  overflow-x:hidden;
}

/* HEADER */
.main-header{
  background:rgba(2,10,20,0.9);
  backdrop-filter:blur(10px);
  height:80px;
}

.navbar-brand{
  color:#f5c16c !important;
  font-weight:600;
}

.nav-link{
  color:#cfcfcf !important;
}

.nav-link:hover,
.nav-link.active{
  color:#f5c16c !important;
}

/* BUTTONS */
.btn-gold{
  background:linear-gradient(135deg,#f5c16c,#d89b3c);
  border:none;
  color:#000;
}

.btn-outline-gold{
  border:1px solid #f5c16c;
  color:#f5c16c;
}

.btn-outline-gold:hover{
  background:#f5c16c;
  color:#000;
}

/* TEXT */
.brand{
  color:#f5c16c;
  letter-spacing:1px;
}

.subtle{
  color:#9bdcff;
  letter-spacing:1px;
  text-transform:uppercase;
  font-size:13px;
}

/* GLASS CARD */
.glass{
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:20px;
  padding:40px;
}

/* INPUTS */
.form-control{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  color:#fff;
}

.form-control:focus{
  background:rgba(255,255,255,0.08);
  color:#fff;
  border-color:#f5c16c;
  box-shadow:none;
}

.hidden{display:none;}

.chat-box{
  max-height:250px;
  overflow-y:auto;
}

.form-control::placeholder {
  color: #ffffff !important;
  opacity: 1; /* ensures full white */
}
</style>
</head>

<body>

<!-- HEADER -->
<nav class="navbar navbar-expand-lg fixed-top main-header">
  <div class="container">
    <a class="navbar-brand" href="/">AstroLogic</a>
    <ul class="navbar-nav mx-auto">
      <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
      <li class="nav-item"><a class="nav-link" href="/panchang">Panchang</a></li>
      <li class="nav-item"><a class="nav-link" href="/kundali">Kundali</a></li>

      <li class="nav-item"><a class="nav-link" href="/horoscope">Horoscope</a></li>
      <li class="nav-item"><a class="nav-link active" href="/prediction">Predictions</a></li>
      <li class="nav-item"><a class="nav-link" href="/blogs">Blogs</a></li>
      <li class="nav-item"><a class="nav-link" href="/about">About</a></li>
    </ul>
  </div>
</nav>

<div class="container" style="padding-top:140px; padding-bottom:80px;">

  <!-- INPUT SECTION -->
  <div class="glass text-center">
    <span class="subtle">AI-Based Insight Engine</span>
    <h2 class="brand mt-2">Discover Your Pattern</h2>

    <div class="row mt-4 g-3">
      <div class="col-md-3">
        <input id="year" type="number" class="form-control" placeholder="Year">
      </div>
      <div class="col-md-3">
        <input id="month" type="number" class="form-control" placeholder="Month">
      </div>
      <div class="col-md-3">
        <input id="day" type="number" class="form-control" placeholder="Day">
      </div>
      <div class="col-md-3">
        <input id="hour" type="number" step="0.01" class="form-control" placeholder="Hour (16.30)">
      </div>
    </div>

    <button class="btn btn-gold mt-4 px-4" onclick="generatePrediction()">
      Reveal Insights
    </button>
  </div>

  <!-- RESULT SECTION -->
  <div id="resultSection" class="hidden mt-5">

    <div class="glass mb-4">
      <h5 class="brand">Marriage Interpretation</h5>
      <div id="marriageSummary" class="mt-3"></div>
    </div>

    <div class="glass mb-4">
      <h5 class="brand">Career Interpretation</h5>
      <div id="careerSummary" class="mt-3"></div>
    </div>

  </div>

  <!-- CHAT SECTION -->
  <div class="glass mt-4">
    <h5 class="brand">AstroAI Chat</h5>
    <div id="chatBox" class="chat-box mt-3"></div>

    <div class="input-group mt-3">
      <input type="text" id="chatInput" class="form-control" placeholder="Ask about health, marriage, career...">
      <button class="btn btn-outline-gold" onclick="sendMessage()">Send</button>
    </div>
  </div>

</div>

<script>
async function generatePrediction(){

  const response = await fetch("/api/prediction",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      year:parseInt(document.getElementById("year").value),
      month:parseInt(document.getElementById("month").value),
      day:parseInt(document.getElementById("day").value),
      hour:parseFloat(document.getElementById("hour").value)
    })
  });

  const data = await response.json();

  document.getElementById("marriageSummary").innerText = data.marriage_prediction;
  document.getElementById("careerSummary").innerText = data.career_prediction;

  document.getElementById("resultSection").classList.remove("hidden");
}

async function sendMessage(){

  const msg = document.getElementById("chatInput").value;

  const response = await fetch("/api/chat",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({message:msg})
  });

  const data = await response.json();

  document.getElementById("chatBox").innerHTML +=
    `<p><b>You:</b> ${msg}</p>
     <p style="color:#9bdcff;"><b>AstroAI:</b> ${data.reply}</p>`;

  document.getElementById("chatInput").value="";
}
</script>

</body>
</html>
