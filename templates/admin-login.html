<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AstroLogic | Admin Login</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#f5c16c;--gold2:#d89b3c;--gold-dim:rgba(245,193,108,0.12);
  --gold-border:rgba(245,193,108,0.28);
  --surface:rgba(255,255,255,0.05);--border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.14);
  --text:#e8e8e8;--text-dim:rgba(232,232,232,0.52);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:radial-gradient(ellipse 140% 70% at 50% -5%,#0c2a4a,#010812);
  color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;
  display:flex;align-items:center;justify-content:center;padding:20px;
}
body::before{
  content:'';position:fixed;inset:0;
  background-image:
    radial-gradient(1px 1px at 12% 18%,rgba(155,220,255,.38),transparent),
    radial-gradient(1px 1px at 78% 8%,rgba(245,193,108,.32),transparent),
    radial-gradient(1.5px 1.5px at 33% 55%,rgba(155,220,255,.25),transparent),
    radial-gradient(1px 1px at 91% 72%,rgba(245,193,108,.22),transparent);
  pointer-events:none;z-index:0;
}
.card{
  position:relative;z-index:1;
  background:rgba(255,255,255,.05);border:1px solid var(--border);
  border-radius:20px;padding:44px 40px;width:100%;max-width:400px;
}
.logo-link{
  display:block;text-align:center;margin-bottom:28px;
  font-family:'Cinzel',serif;font-size:22px;font-weight:600;
  color:var(--gold);text-decoration:none;letter-spacing:1.5px;
}
.logo-link sup{font-size:11px;opacity:.6;font-weight:400;vertical-align:super;}
h2{
  font-family:'Cinzel',serif;text-align:center;font-size:16px;
  font-weight:600;letter-spacing:.5px;color:var(--text-dim);
  margin-bottom:28px;text-transform:uppercase;
}
.divider{width:40px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:0 auto 28px;}

.err{
  background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);
  color:#f87171;border-radius:8px;padding:10px 14px;
  font-size:13.5px;margin-bottom:18px;
}
.field{margin-bottom:16px;}
.field label{display:block;font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--text-dim);margin-bottom:6px;}
.field input{
  width:100%;background:rgba(255,255,255,.07)!important;border:1px solid var(--border2)!important;
  color:#fff!important;border-radius:8px;padding:11px 14px;font-size:14px;
  font-family:'Inter',sans-serif;transition:border-color .2s;
}
.field input:focus{outline:none;border-color:var(--gold)!important;background:rgba(255,255,255,.1)!important;}
.field input::placeholder{color:rgba(255,255,255,.3)!important;}
.btn-login{
  width:100%;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000;
  font-weight:700;font-size:15px;padding:12px;border-radius:10px;
  border:none;cursor:pointer;font-family:'Inter',sans-serif;
  margin-top:6px;transition:all .25s;
}
.btn-login:hover{filter:brightness(1.1);transform:translateY(-1px);box-shadow:0 8px 24px rgba(245,193,108,.25);}
.back{display:block;text-align:center;margin-top:20px;font-size:13px;color:var(--text-dim);text-decoration:none;transition:.2s;}
.back:hover{color:var(--gold);}
</style>
</head>
<body>
<div class="card">
  <a class="logo-link" href="/">Astro<sup>✦</sup>Logic</a>
  <h2>Admin Login</h2>
  <div class="divider"></div>

  {% if error %}
  <div class="err">{{ error }}</div>
  {% endif %}

  <form method="POST">
    <div class="field">
      <label>Username</label>
      <input name="username" placeholder="Enter username" required autocomplete="username">
    </div>
    <div class="field">
      <label>Password</label>
      <input name="password" type="password" placeholder="Enter password" required autocomplete="current-password">
    </div>
    <button type="submit" class="btn-login">Sign In →</button>
  </form>
  <a href="/" class="back">← Back to Website</a>
</div>
</body>
</html>
