<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AstroLogic | Admin Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
  margin:0;
  background: radial-gradient(circle at top,#06192d,#010812);
  color:#fff;
  font-family:"Segoe UI", sans-serif;
}

/* SIDEBAR */
.sidebar{
  width:240px;
  height:100vh;
  position:fixed;
  left:0;
  top:0;
  background:rgba(2,10,20,0.95);
  border-right:1px solid rgba(255,255,255,0.1);
  padding:30px 20px;
}

.sidebar h4{
  color:#f5c16c;
  margin-bottom:30px;
}

.sidebar a{
  display:block;
  color:#ccc;
  text-decoration:none;
  margin-bottom:15px;
  padding:8px 10px;
  border-radius:8px;
  transition:0.3s;
}

.sidebar a:hover{
  background:rgba(255,255,255,0.08);
  color:#f5c16c;
}

/* MAIN */
.main{
  margin-left:240px;
  padding:30px;
}

/* CARDS */
.glass{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:16px;
  padding:20px;
}

/* STATS */
.stat-card{
  text-align:center;
  padding:20px;
  border-radius:16px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
}

.stat-card h3{
  color:#f5c16c;
}

/* TABLE */
.admin-table{
  color:#fff;
}

.admin-table thead th{
  color:#f5c16c;
}

.admin-table tbody tr{
  background:rgba(255,255,255,0.03);
  transition:0.3s;
}

.admin-table tbody tr:hover{
  background:rgba(255,255,255,0.08);
}

/* BUTTONS */
.btn-gold{
  background:linear-gradient(135deg,#f5c16c,#d89b3c);
  border:none;
  color:#000;
}

.btn-outline-gold{
  border:1px solid #f5c16c;
  color:#f5c16c;
}

.btn-outline-gold:hover{
  background:#f5c16c;
  color:#000;
}

input, textarea{
  background:rgba(255,255,255,0.08) !important;
  border:1px solid rgba(255,255,255,0.15) !important;
  color:#fff !important;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h4>AstroLogic</h4>

  <a href="/admin/blogs">📄 Blog Management</a>
  <a href="/">🌐 View Website</a>
  <a href="/admin/logout">🚪 Logout</a>
</div>

<!-- MAIN CONTENT -->
<div class="main">

  <h2 class="mb-4 text-warning">Admin Dashboard</h2>

  <!-- STATS -->
  <div class="row mb-4">
    <div class="col-md-4">
      <div class="stat-card">
        <h3 id="totalBlogs">0</h3>
        <p>Total Blogs</p>
      </div>
    </div>

    <div class="col-md-4">
      <div class="stat-card">
        <h3>Active</h3>
        <p>Status</p>
      </div>
    </div>

    <div class="col-md-4">
      <div class="stat-card">
        <h3>Admin</h3>
        <p>Role</p>
      </div>
    </div>
  </div>

  <!-- CREATE BLOG -->
  <div class="glass mb-5">
    <h5>Create / Edit Blog</h5>

    <form id="blogForm" method="POST" action="/api/admin/blogs">
      <div class="mb-3">
        <input name="title" class="form-control" placeholder="Blog Title" required>
      </div>

      <div class="mb-3">
        <textarea name="content" rows="5" class="form-control" placeholder="Blog Content" required></textarea>
      </div>

      <button class="btn btn-gold">Publish</button>
      <button type="button" class="btn btn-outline-gold" onclick="resetForm()">Cancel</button>
    </form>
  </div>

  <!-- BLOG TABLE -->
  <div class="glass">
    <h5 class="mb-3">All Blogs</h5>

    <div class="table-responsive">
      <table class="table admin-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Title</th>
            <th width="150">Actions</th>
          </tr>
        </thead>
        <tbody id="blogTableBody"></tbody>
      </table>
    </div>
  </div>

</div>

<script>
async function loadBlogs() {
    const res = await fetch("/api/admin/blogs");
    const blogs = await res.json();

    const table = document.getElementById("blogTableBody");
    const total = document.getElementById("totalBlogs");

    table.innerHTML = "";
    total.innerText = blogs.length;

    blogs.forEach((blog, index) => {
        table.innerHTML += `
        <tr>
          <td>${index + 1}</td>
          <td>${blog.title}</td>
          <td>
            <button class="btn btn-sm btn-outline-gold"
              onclick="editBlog(${blog.id}, \`${blog.title}\`, \`${blog.content}\`)">
              Edit
            </button>

            <form method="POST"
              action="/api/admin/blogs/delete/${blog.id}"
              style="display:inline;">
              <button class="btn btn-sm btn-danger">
                Delete
              </button>
            </form>
          </td>
        </tr>
        `;
    });
}

function editBlog(id, title, content){
    document.querySelector("input[name='title']").value = title;
    document.querySelector("textarea[name='content']").value = content;
    document.getElementById("blogForm").action = `/api/admin/blogs/update/${id}`;
    window.scrollTo({top:0, behavior:"smooth"});
}

function resetForm(){
    document.getElementById("blogForm").reset();
    document.getElementById("blogForm").action = "/api/admin/blogs";
}

loadBlogs();
</script>

</body>
</html>
