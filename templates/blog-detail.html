

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AstroLogic | Blog</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
  background: radial-gradient(circle at top, #06192d, #010812);
  color:#ffffff;
  font-family:"Segoe UI", sans-serif;
}

/* HEADER */
.main-header{
  background:rgba(2,10,20,0.95);
  backdrop-filter:blur(10px);
  height:80px;
}
.navbar-brand{ color:#f5c16c !important; }
.nav-link{ color:#cfcfcf !important; }
.nav-link:hover,.nav-link.active{ color:#f5c16c !important; }

/* PAGE */
.page{
  padding-top:120px;
  padding-bottom:80px;
}

.blog-container{
  max-width:850px;
  margin:0 auto;
}

.blog-title{
  color:#f5c16c;
  font-size:38px;
  font-weight:600;
  margin-bottom:15px;
}

.blog-meta{
  opacity:0.6;
  font-size:14px;
  margin-bottom:30px;
}

.blog-content{
  line-height:1.9;
  font-size:17px;
  opacity:0.95;
  white-space:pre-line;
}

.back-link{
  display:inline-block;
  margin-top:40px;
  text-decoration:none;
  color:#9bdcff;
}

.back-link:hover{
  text-decoration:underline;
}

.footer{
  text-align:center;
  padding:20px;
  font-size:14px;
  opacity:0.6;
}
</style>
</head>

<body>

<!-- HEADER -->
<nav class="navbar navbar-expand-lg fixed-top main-header">
  <div class="container">
    <a class="navbar-brand" href="/">AstroLogic</a>
    <ul class="navbar-nav mx-auto">
      <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
      <li class="nav-item"><a class="nav-link" href="/panchang">Panchang</a></li>
      <li class="nav-item"><a class="nav-link" href="/horoscope">Horoscope</a></li>
      <li class="nav-item"><a class="nav-link" href="/prediction">Predictions</a></li>
      <li class="nav-item"><a class="nav-link active" href="/blogs">Blogs</a></li>
      <li class="nav-item"><a class="nav-link" href="/about">About</a></li>
    </ul>
  </div>
</nav>

<section class="page">
<div class="container blog-container">

  <h1 id="blogTitle" class="blog-title"></h1>
  <div id="blogDate" class="blog-meta"></div>
  <div id="blogContent" class="blog-content"></div>

  <a href="/blogs" class="back-link">← Back to Blogs</a>

</div>
</section>

<div class="footer">
  © 2026 AstroLogic. All rights reserved.
</div>

<script>
const blogId = "{{ blog_id }}";

async function loadBlog() {
  try {
    const res = await fetch(`/api/blogs/${blogId}`);
    const blog = await res.json();

    if (!blog || blog.error) {
      document.getElementById("blogTitle").innerText = "Blog not found";
      return;
    }

    document.getElementById("blogTitle").innerText = blog.title || "Untitled";
    document.getElementById("blogDate").innerText =
      blog.created_at ? new Date(blog.created_at).toDateString() : "";
    document.getElementById("blogContent").innerText =
      blog.content || "";

  } catch (err) {
    console.error("Error loading blog:", err);
    document.getElementById("blogTitle").innerText = "Error loading blog";
  }
}

loadBlog();
</script>

</body>
</html>
